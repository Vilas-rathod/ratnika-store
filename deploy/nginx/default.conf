# ── Ratnika edge reverse proxy ───────────────────────────────────
# The single public entrypoint (port 80). Routes traffic to the
# storefront (frontend SPA container) and the Spring Boot backend.
#
#   /            -> frontend  (React SPA served by its own nginx)
#   /api/        -> backend   (Spring Boot REST API)
#   /actuator/   -> backend   (health / prometheus — for smoke checks)
#   /swagger-ui, /v3/api-docs -> backend (API docs)

upstream frontend_upstream {
    server frontend:80;
}

upstream backend_upstream {
    server backend:8080;
}

server {
    listen 80;
    server_name _;

    # Real client IP forwarding for all proxied requests
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    client_max_body_size 40m;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Backend REST API ─────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend_upstream/api/;
    }

    # ── Actuator (health, prometheus) — used by smoke tests ──────
    location /actuator/ {
        proxy_pass http://backend_upstream/actuator/;
    }

    # ── API docs ─────────────────────────────────────────────────
    location /swagger-ui {
        proxy_pass http://backend_upstream/swagger-ui;
    }
    location /v3/api-docs {
        proxy_pass http://backend_upstream/v3/api-docs;
    }

    # ── Storefront (SPA) ─────────────────────────────────────────
    location / {
        proxy_pass http://frontend_upstream/;
    }

    # Edge-level liveness endpoint (proxy is up, regardless of backends)
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
