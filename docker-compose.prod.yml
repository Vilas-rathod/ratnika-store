# ── Ratnika — Production / Deploy Compose ────────────────────────
# Runs PREBUILT images pulled from Docker Hub (no build here). This is
# the file the Jenkins "Deploy" stage uses on the server:
#
#   docker compose -f docker-compose.prod.yml --env-file deploy/.env pull
#   docker compose -f docker-compose.prod.yml --env-file deploy/.env up -d
#
# Image tags come from the pipeline via ${DOCKERHUB_USERNAME} and ${IMAGE_TAG}.
# Copy deploy/.env.example -> deploy/.env and fill in real secrets first.

name: ratnika

services:
  mysql:
    image: mysql:8.0
    container_name: ratnika-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ratnika}
      MYSQL_USER: ${MYSQL_USER:-ratnika}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in deploy/.env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in deploy/.env}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [ratnika-net]

  redis:
    image: redis:7-alpine
    container_name: ratnika-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [ratnika-net]

  backend:
    image: ${DOCKERHUB_USERNAME}/ratnika-backend:${IMAGE_TAG:-latest}
    container_name: ratnika-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DDL_AUTO: ${DDL_AUTO:-update}
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-ratnika}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: ${MYSQL_USER:-ratnika}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in deploy/.env}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks: [ratnika-net]

  frontend:
    image: ${DOCKERHUB_USERNAME}/ratnika-frontend:${IMAGE_TAG:-latest}
    container_name: ratnika-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks: [ratnika-net]

  # ── Edge reverse proxy — the single public entrypoint (port 80) ──
  nginx:
    image: nginx:1.27-alpine
    container_name: ratnika-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
    networks: [ratnika-net]

  prometheus:
    image: prom/prometheus:latest
    container_name: ratnika-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks: [ratnika-net]

  grafana:
    image: grafana/grafana:latest
    container_name: ratnika-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks: [ratnika-net]

volumes:
  mysql_data:
  redis_data:
  grafana_data:

networks:
  ratnika-net:
    driver: bridge
