spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ratnika?createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
  jpa:
#    show-sql: true
    properties:
      hibernate:
        format_sql: true
        ddl-auto:
          update

app:
  seed:
    enabled: true   # populate demo data on startup when the DB is empty

logging:
  level:
    com.ratnika: DEBUG
