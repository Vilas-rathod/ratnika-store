spring:
  application:
    name: ratnika-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    open-in-view: false
    hibernate:
      # Hibernate manages the schema by default so the app runs out of the box.
      # For strict production, set to "validate" and enable Flyway (see V1__init.sql).
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true

  flyway:
    # Flyway is wired and a baseline migration is provided. Flip to true
    # (with ddl-auto=validate) to manage the schema via versioned migrations.
    enabled: ${FLYWAY_ENABLED:false}
    baseline-on-migrate: true

