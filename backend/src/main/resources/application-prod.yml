spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    show-sql: false

app:
  seed:
    enabled: false

logging:
  level:
    com.ratnika: INFO
    root: WARN
