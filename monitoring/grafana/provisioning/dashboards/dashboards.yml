# Auto-loads dashboard JSON files from the json/ subfolder.
apiVersion: 1

providers:
  - name: 'Ratnika'
    orgId: 1
    folder: 'Ratnika'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
