name: Deploy demo to GitHub Pages

# Builds the frontend in standalone mock-API mode and publishes it to
# GitHub Pages at https://vilas-rathod.github.io/ratnika-store/
# (served from the gh-pages branch)

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build (mock API, served under /ratnika-store/)
        run: npm run build -- --base=/ratnika-store/
        working-directory: frontend
        env:
          VITE_USE_MOCK_API: 'true'

      - name: SPA fallback for deep links
        run: cp dist/index.html dist/404.html
        working-directory: frontend

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
